<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blog WASM Frontend</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        .error { color: red; }
        .post { border: 1px solid #ccc; margin: 1em 0; padding: 1em; }
        .auth-form, .post-form { margin: 1em 0; padding: 1em; border: 1px solid #ddd; }
        input, textarea, button { margin: 0.5em; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Blog</h1>
        <div id="auth-status"></div>
        <div id="auth-forms">
            <div class="auth-form">
                <h3>Register</h3>
                <input id="reg-username" placeholder="Username">
                <input id="reg-email" placeholder="Email">
                <input id="reg-password" type="password" placeholder="Password">
                <button id="reg-btn">Register</button>
            </div>
            <div class="auth-form">
                <h3>Login</h3>
                <input id="login-username" placeholder="Username">
                <input id="login-password" type="password" placeholder="Password">
                <button id="login-btn">Login</button>
            </div>
        </div>
        <button id="logout-btn" style="display:none;">Logout</button>
        <div id="post-form" class="post-form" style="display:none;">
            <h3>New Post</h3>
            <input id="post-title" placeholder="Title">
            <textarea id="post-content" placeholder="Content"></textarea>
            <button id="create-btn">Create Post</button>
        </div>
        <div id="posts-list"></div>
    </div>
    <script type="module">
        import init, { BlogApp } from './pkg/blog_wasm.js';
        async function run() {
            await init();
            const app = BlogApp.new("http://localhost:3000");
            window.app = app; // for debugging

            const regBtn = document.getElementById('reg-btn');
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const createBtn = document.getElementById('create-btn');
            const postFormDiv = document.getElementById('post-form');

            function updateUI() {
                const authed = app.is_authenticated();
                document.getElementById('auth-forms').style.display = authed ? 'none' : 'block';
                logoutBtn.style.display = authed ? 'inline' : 'none';
                postFormDiv.style.display = authed ? 'block' : 'none';
                if (authed) {
                    document.getElementById('auth-status').innerText = `Logged in as ${app.get_username()}`;
                } else {
                    document.getElementById('auth-status').innerText = 'Not logged in';
                }
                loadPosts();
            }

            async function loadPosts() {
                try {
                    const posts = await app.load_posts();
                    const container = document.getElementById('posts-list');
                    container.innerHTML = '';
                    for (let post of posts) {
                        const isAuthor = app.is_authenticated() && post.author_id === app.get_user_id();
                        const div = document.createElement('div');
                        div.className = 'post';
                        div.innerHTML = `
                            <h3>${escapeHtml(post.title)}</h3>
                            <p>${escapeHtml(post.content)}</p>
                            <small>by user ${post.author_id} at ${post.created_at}</small>
                            ${isAuthor ? `<button class="edit-btn" data-id="${post.id}">Edit</button>
                                         <button class="delete-btn" data-id="${post.id}">Delete</button>` : ''}
                        `;
                        container.appendChild(div);
                    }
                    document.querySelectorAll('.edit-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = parseInt(btn.dataset.id);
                            const newTitle = prompt("New title");
                            const newContent = prompt("New content");
                            if (newTitle && newContent) {
                                await app.update_post(id, newTitle, newContent);
                                loadPosts();
                            }
                        });
                    });
                    document.querySelectorAll('.delete-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const id = parseInt(btn.dataset.id);
                            if (confirm("Delete post?")) {
                                await app.delete_post(id);
                                loadPosts();
                            }
                        });
                    });
                } catch (err) {
                    console.error(err);
                }
            }

            function escapeHtml(str) {
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            regBtn.onclick = async () => {
                const username = document.getElementById('reg-username').value;
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-password').value;
                try {
                    await app.register(username, email, password);
                    updateUI();
                } catch(e) {
                    alert("Registration failed: " + e);
                }
            };
            loginBtn.onclick = async () => {
                const username = document.getElementById('login-username').value;
                const password = document.getElementById('login-password').value;
                try {
                    await app.login(username, password);
                    updateUI();
                } catch(e) {
                    alert("Login failed: " + e);
                }
            };
            logoutBtn.onclick = () => {
                app.logout();
                updateUI();
            };
            createBtn.onclick = async () => {
                const title = document.getElementById('post-title').value;
                const content = document.getElementById('post-content').value;
                if (title && content) {
                    await app.create_post(title, content);
                    document.getElementById('post-title').value = '';
                    document.getElementById('post-content').value = '';
                    loadPosts();
                } else {
                    alert("Title and content required");
                }
            };
            updateUI();
        }
        run();
    </script>
</body>
</html>
